# Configuración del sitio Scopios Medical
# Soluciona el problema del 404 en SPAs (Single Page Applications)

server {
    listen 8080;
    server_name scopios.vortekai.es;
    root /usr/share/nginx/html;
    index index.html;

    # Seguridad Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https://uhyjyrcnbythavjzdwtk.supabase.co https://*.supabase.co; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://uhyjyrcnbythavjzdwtk.supabase.co https://*.supabase.co https://nominatim.openstreetmap.org; frame-ancestors 'self';" always;

    # Logs específicos del sitio
    access_log /var/log/nginx/scopios-access.log;
    error_log /var/log/nginx/scopios-error.log warn;

    # Caché para assets estáticos (con hash en nombre)
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Servir index.html directamente
    location = / {
        try_files /index.html =404;
    }

    # SOLUCIÓN 404: Todas las rutas sirven index.html (SPA routing)
    # Excepto archivos que existen (assets, favicon, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Desactivar logs para favicon y robots.txt
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # Bloquear acceso a archivos ocultos (.git, .env, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages personalizadas
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
