# Configuración del sitio Scopios Medical
# Soluciona el problema del 404 en SPAs

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Seguridad Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache para assets con hash en nombre
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SOLUCION 404: Todas las rutas sirven index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquear archivos ocultos (.git, .env)
    location ~ /\. {
        deny all;
    }
}
